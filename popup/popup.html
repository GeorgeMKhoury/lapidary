<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'" />
  <title>Lapidary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      padding: 16px;
      font-family: Google Sans, Roboto, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #fff;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8eaed;
    }

    header img {
      width: 32px;
      height: 32px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1a73e8;
    }

    #status-section {
      margin-bottom: 16px;
    }

    .status-label {
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 4px;
    }

    .status-value {
      font-weight: 500;
    }

    .status-value.signed-out {
      color: #d93025;
    }

    .status-value.signed-in {
      color: #188038;
    }

    #actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 9px 16px;
      border-radius: 6px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }
    .btn-primary:hover { background: #1557b0; }

    .btn-secondary {
      background: #f1f3f4;
      color: #202124;
    }
    .btn-secondary:hover { background: #e8eaed; }

    .btn-danger {
      background: #fce8e6;
      color: #d93025;
    }
    .btn-danger:hover { background: #f5c6c2; }

    a.drive-link {
      display: block;
      text-align: center;
      padding: 9px 16px;
      border-radius: 6px;
      background: #e8f0fe;
      color: #1a73e8;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    a.drive-link:hover { background: #d2e3fc; }

    .format-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #5f6368;
    }

    .format-row span {
      flex-shrink: 0;
    }

    .toggle-group {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #dadce0;
    }

    .toggle-group button {
      width: auto;
      flex: 1;
      padding: 6px 12px;
      border-radius: 0;
      border: none;
      font-size: 12px;
      font-weight: 500;
      background: #f1f3f4;
      color: #5f6368;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-group button.active {
      background: #1a73e8;
      color: #fff;
    }

    .toggle-group button:not(.active):hover {
      background: #e8eaed;
    }

    #message {
      margin-top: 10px;
      font-size: 12px;
      color: #5f6368;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <header>
    <img src="../icons/icon48.png" alt="Lapidary" />
    <h1>Lapidary</h1>
  </header>

  <section id="status-section">
    <div class="status-label">Status</div>
    <div class="status-value" id="status-value">Loading…</div>
  </section>

  <div id="actions">
    <!-- Populated by popup.js -->
  </div>

  <div id="message"></div>

  <script src="popup.js"></script>
</body>
</html>
